description: "Sol Brain — Command Interpreter (15 test cases, threshold 15/15)"

# Run: cd /root/x-bot/sol-bot && promptfoo eval -c tests/brain_test.yaml --pass-rate-threshold 100

providers:
  - id: openai:anthropic/claude-haiku-4-5
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: OPENROUTER_API_KEY

prompts:
  - label: sol-brain
    raw: >-
      [
        {
          "role": "system",
          "content": "You are Sol's command interpreter. Sol is a geopolitical-macro analyst bot that publishes to Threads.\n\nYour job: read the owner's message and return a JSON object with exactly two fields:\n- \"action\": one of [generate_sol, generate_mixed, generate_original, publish, publish_threads_only, regenerate, regenerate_with_instruction, cancel, unknown]\n- \"instruction\": any specific correction or extra context (empty string if none)\n\nRules:\n- Owner speaks Spanish or English — handle both\n- \"publícalo\", \"mándalo\", \"súbelo\", \"dale\", \"va\" = publish\n- \"solo en threads\", \"only threads\" = publish_threads_only\n- \"de nuevo\", \"otra vez\", \"regenera\", \"no me gustó\" without extra context = regenerate\n- \"de nuevo pero [condition]\", \"hazlo más [adj]\", \"ponlo más [adj]\", \"cambia [something]\" = regenerate_with_instruction, put the condition in instruction field\n- \"cancela\", \"olvídalo\", \"no lo publiques\", \"dejalo\" = cancel\n- If message contains actual news text (headline, data, event), action = generate_sol unless user specifies mixed or original\n- \"genera el mixed\", \"hazlo mixed\", \"combinada\" = generate_mixed\n- \"wire en inglés\", \"solo el wire\", \"original\" = generate_original\n- Return ONLY valid JSON. No markdown fences, no explanation."
        },
        {
          "role": "user",
          "content": "{{message}}"
        }
      ]

# Shared JS helper — strips markdown fences then parses JSON
# Each assertion inlines this so there are no external dependencies

tests:
  # ── 1. publish ──────────────────────────────────────────────────────
  - description: "1. publícalo → publish"
    vars:
      message: "publícalo"
    assert:
      - type: javascript
        value: |
          const j = JSON.parse(output.replace(/^```(?:json)?\s*\n?/,'').replace(/\n?```\s*$/,'').trim());
          return j.action === 'publish';

  # ── 2. publish (short confirmation) ─────────────────────────────────
  - description: "2. dale → publish"
    vars:
      message: "dale"
    assert:
      - type: javascript
        value: |
          const j = JSON.parse(output.replace(/^```(?:json)?\s*\n?/,'').replace(/\n?```\s*$/,'').trim());
          return j.action === 'publish';

  # ── 3. legacy platform wording ──────────────────────────────────────
  - description: "3. súbelo solo en Threads → publish_threads_only"
    vars:
      message: "súbelo solo en Threads"
    assert:
      - type: javascript
        value: |
          const j = JSON.parse(output.replace(/^```(?:json)?\s*\n?/,'').replace(/\n?```\s*$/,'').trim());
          return j.action === 'publish_threads_only';

  # ── 4. publish_threads_only ─────────────────────────────────────────
  - description: "4. publícalo solo en threads → publish_threads_only"
    vars:
      message: "publícalo solo en threads"
    assert:
      - type: javascript
        value: |
          const j = JSON.parse(output.replace(/^```(?:json)?\s*\n?/,'').replace(/\n?```\s*$/,'').trim());
          return j.action === 'publish_threads_only';

  # ── 5. regenerate (no instruction) ──────────────────────────────────
  - description: "5. hazlo de nuevo → regenerate"
    vars:
      message: "hazlo de nuevo"
    assert:
      - type: javascript
        value: |
          const j = JSON.parse(output.replace(/^```(?:json)?\s*\n?/,'').replace(/\n?```\s*$/,'').trim());
          return j.action === 'regenerate';

  # ── 6. regenerate (negative feedback, no instruction) ───────────────
  - description: "6. no me gustó → regenerate"
    vars:
      message: "no me gustó"
    assert:
      - type: javascript
        value: |
          const j = JSON.parse(output.replace(/^```(?:json)?\s*\n?/,'').replace(/\n?```\s*$/,'').trim());
          return j.action === 'regenerate';

  # ── 7. regenerate_with_instruction + instruction check ───────────────
  - description: "7. de nuevo pero más corto y agresivo → regenerate_with_instruction, instruction has corto or agresivo"
    vars:
      message: "de nuevo pero más corto y agresivo"
    assert:
      - type: javascript
        value: |
          const j = JSON.parse(output.replace(/^```(?:json)?\s*\n?/,'').replace(/\n?```\s*$/,'').trim());
          if (j.action !== 'regenerate_with_instruction') return false;
          const instr = j.instruction.toLowerCase();
          return instr.includes('corto') || instr.includes('agresivo');

  # ── 8. regenerate_with_instruction (tone change) ─────────────────────
  - description: "8. ponlo más sarcástico → regenerate_with_instruction"
    vars:
      message: "ponlo más sarcástico"
    assert:
      - type: javascript
        value: |
          const j = JSON.parse(output.replace(/^```(?:json)?\s*\n?/,'').replace(/\n?```\s*$/,'').trim());
          return j.action === 'regenerate_with_instruction';

  # ── 9. cancel ────────────────────────────────────────────────────────
  - description: "9. olvídalo → cancel"
    vars:
      message: "olvídalo"
    assert:
      - type: javascript
        value: |
          const j = JSON.parse(output.replace(/^```(?:json)?\s*\n?/,'').replace(/\n?```\s*$/,'').trim());
          return j.action === 'cancel';

  # ── 10. generate_sol (Spanish news) ──────────────────────────────────
  - description: "10. Spanish news headline → generate_sol"
    vars:
      message: "China reportó crecimiento de 5.1% en Q1 2026"
    assert:
      - type: javascript
        value: |
          const j = JSON.parse(output.replace(/^```(?:json)?\s*\n?/,'').replace(/\n?```\s*$/,'').trim());
          return j.action === 'generate_sol';

  # ── 11. generate_sol (English news) ──────────────────────────────────
  - description: "11. English news headline → generate_sol"
    vars:
      message: "Fed held rates at 4.5% for third consecutive meeting"
    assert:
      - type: javascript
        value: |
          const j = JSON.parse(output.replace(/^```(?:json)?\s*\n?/,'').replace(/\n?```\s*$/,'').trim());
          return j.action === 'generate_sol';

  # ── 12. generate_mixed ───────────────────────────────────────────────
  - description: "12. genera el mixed → generate_mixed"
    vars:
      message: "genera el mixed de esta noticia: Russia vetoed UN resolution"
    assert:
      - type: javascript
        value: |
          const j = JSON.parse(output.replace(/^```(?:json)?\s*\n?/,'').replace(/\n?```\s*$/,'').trim());
          return j.action === 'generate_mixed';

  # ── 13. generate_original ────────────────────────────────────────────
  - description: "13. wire en inglés → generate_original"
    vars:
      message: "wire en inglés"
    assert:
      - type: javascript
        value: |
          const j = JSON.parse(output.replace(/^```(?:json)?\s*\n?/,'').replace(/\n?```\s*$/,'').trim());
          return j.action === 'generate_original';

  # ── 14. regenerate_with_instruction + non-empty instruction ──────────
  - description: "14. correction + regenerate → regenerate_with_instruction, instruction not empty"
    vars:
      message: "te equivocaste, la noticia era sobre Rusia no China, hazlo de nuevo"
    assert:
      - type: javascript
        value: |
          const j = JSON.parse(output.replace(/^```(?:json)?\s*\n?/,'').replace(/\n?```\s*$/,'').trim());
          return j.action === 'regenerate_with_instruction' && j.instruction.trim().length > 0;

  # ── 15. publish (colloquial "two sides") ─────────────────────────────
  - description: "15. mándalo a los dos lados → publish"
    vars:
      message: "mándalo a los dos lados"
    assert:
      - type: javascript
        value: |
          const j = JSON.parse(output.replace(/^```(?:json)?\s*\n?/,'').replace(/\n?```\s*$/,'').trim());
          return j.action === 'publish';
