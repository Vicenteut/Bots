description: "Sol Post Quality Evaluator — LLM-as-Judge"

prompts:
  - file://sol_evaluator_prompt.json

providers:
  - id: openai:chat:anthropic/claude-sonnet-4-6
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      temperature: 0.1
      max_tokens: 300

defaultTest:
  assert:
    - type: is-json
    - type: javascript
      value: "(() => { try { const o = JSON.parse(output); return o.total_score >= 4 && o.total_score <= 20; } catch(e) { return false; } })()"
    - type: javascript
      value: "(() => { try { const o = JSON.parse(output); return ['A','B','C','D'].includes(o.quality_tier); } catch(e) { return false; } })()"
    - type: javascript
      value: "(() => { try { const o = JSON.parse(output); return ['Cold Fact Drop','Buried Lede','Nobody Noticed','History Rhyme','Math Check','none'].includes(o.move_detected); } catch(e) { return false; } })()"
    - type: javascript
      value: "(() => { try { const o = JSON.parse(output); return typeof o.one_line_verdict === 'string' && o.one_line_verdict.length > 0; } catch(e) { return false; } })()"

tests:
  - description: "TC1 — People scream WW3 (414 views)"
    vars:
      post: |
        People scream WW3 every time something explodes.

        The more serious signal is when essential infrastructure starts looking like a target.

  - description: "TC2 — Three direct Iranian strikes (84 views)"
    vars:
      post: |
        I've covered this from every angle today already — strikes, oil, escalation ladder, Saudi base, Hormuz, Cuba.

        The one thing nobody's pricing: three direct Iranian strikes in 14 months and zero diplomatic offramps left.

        Diplomacy doesn't resume after the 4th. 🔴

  - description: "TC3 — Yemen third vector (81 views)"
    vars:
      post: |
        Yemen just added a third vector.

        Iran direct. Hezbollah degraded. Houthis still launching.

        The "axis is broken" narrative aged about 90 days. 💀

  - description: "TC4 — 50,000 US troops Middle East (70 views)"
    vars:
      post: "JUST IN: 🇺🇸 Over 50,000 US troops now in the Middle East, 10,000 more than usual, NYT reports."

  - description: "TC5 — Diplomatic language (70 views)"
    vars:
      post: |
        That's an easy read.

        But diplomatic language is almost always optimized for signaling, not submission.

        What matters isn't the tone of the statement.

        It's what moves after it.

  - description: "TC6 — Crude oil $130 odds (68 views)"
    vars:
      post: "JUST IN: Odds of crude oil hitting $130 per barrel surge to 57%"

  - description: "TC7 — Prince Sultan Air Base (67 views)"
    vars:
      post: |
        Prince Sultan Air Base hasn't been directly hit since the 2019 Abqaiq attack.

        10 US casualties on Saudi soil changes the entire calculus.

        This isn't proxy war anymore. This is direct contact. 🔥

        Brent $120 by Monday feels conservative.

  - description: "TC8 — Iranian official vows lesson (66 views)"
    vars:
      post: "JUST IN: 🇮🇷 Senior Iranian official says Tehran will decide when the war ends, vows to \"teach Trump and Netanyahu a historic lesson.\""

  - description: "TC9 — Bab El Mandeb insurance premiums (62 views)"
    vars:
      post: |
        I flagged this exact chokepoint hours ago.

        "Considering" closing Bab El Mandeb is the threat. The damage is already done — insurance premiums on Red Sea routes up 300% since October.

        They don't need to close it. They just need you to believe they will. 🔴

  - description: "TC10 — $190M liquidated BTC (57 views)"
    vars:
      post: |
        $190M liquidated in 15 minutes and the leverage addicts still won't learn.

        BTC dropping to $65K isn't the story. The story is who's selling and where those dollars are rotating. 🔍

        Check defense stocks tomorrow morning.
