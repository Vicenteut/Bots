<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="stylesheet" href="templates/_shared.css" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="templates/_interrupts.js"></script>
    <style>
      .ticker {
        position: absolute; left: 0; right: 0; bottom: 60px;
        background: #000; color: #00ff88;
        font-family: "Bebas Neue", sans-serif; font-size: 44px;
        padding: 12px 40px; letter-spacing: 3px; z-index: 24;
        white-space: nowrap; overflow: hidden;
      }
      /* Title — promoted to dominant text above the leader's head.
         Lives in the safe zone between the badge (top:178) and the head
         zone (~y=500-1080) so screenshots read clean. */
      .hook-line {
        position: absolute; left: 50px; right: 50px; top: 240px;
        font-family: "Bebas Neue", sans-serif;
        font-size: 104px; line-height: 0.95; letter-spacing: 1px;
        color: #ffffff; text-align: center; z-index: 24;
        text-shadow: 5px 5px 16px rgba(0,0,0,0.95);
        -webkit-text-stroke: 3px #000; paint-order: stroke fill;
        text-transform: uppercase;
      }
      /* One word per title gets the gold accent. Renderer wraps it server-side. */
      .hook-line .gold { color: #ffd500; }
      /* Numeric stat — demoted to a yellow accent below the speaker's chest.
         Smaller than the title so it doesn't compete for attention. */
      .big-num {
        position: absolute; left: 60px; right: 60px; top: 1080px;
        font-family: "Bebas Neue", sans-serif;
        font-size: 180px; line-height: 0.9; color: #ffd500;
        text-align: center; z-index: 23;
        text-shadow: 6px 6px 24px rgba(0,0,0,0.95);
      }
      #beat-stamp-1 { top: 1290px; }
      #beat-stamp-2 { top: 1290px; }
      #beat-stamp-3 { top: 1290px; }
    </style>
  </head>
  <body>
    <div id="root"
      data-composition-id="ReelMarkets"
      data-start="0" data-duration="{{DURATION}}" data-fps="30"
      data-width="1080" data-height="1920">

      <video id="bg" class="clip"
        data-start="0" data-duration="{{DURATION}}" data-track-index="0"
        src="assets/{{BG}}" muted playsinline loop></video>

      <div class="overlay"></div>
      <div class="alarm-strip alarm-strip-top"></div>
      <div class="alarm-strip alarm-strip-bottom"></div>

      <div class="badge" id="badge">{{LABEL}}</div>
      <div class="big-num" id="bignum">{{BIG_NUM}}</div>
      <div class="hook-line" id="hook">{{HOOK}}</div>
      <div id="rehook-stamp">{{REHOOK}}</div>
      <div class="beat-stamp" id="beat-stamp-1">{{BEAT1}}</div>
      <div class="beat-stamp" id="beat-stamp-2">{{BEAT2}}</div>
      <div class="beat-stamp" id="beat-stamp-3">{{BEAT3}}</div>
      <div id="karaoke">{{KARAOKE_HTML}}</div>
      <div id="cta-stamp">{{CTA_TEXT}}</div>
      <div class="ticker" id="ticker">{{TICKER_TEXT}}</div>

      <div id="cut-flash"></div>
      <div id="color-flash"></div>

      <div class="brand">
        <div class="brand-name">THE CLAM LETTER</div>
        <div class="brand-tag">{{BRAND_TAG}}</div>
      </div>

      <audio id="tts" class="clip"
        data-start="0.4" data-duration="{{TTS_DURATION}}" data-track-index="9"
        data-volume="1.0" src="assets/{{TTS}}"></audio>
      <audio id="music" class="clip"
        data-start="0" data-duration="{{DURATION}}" data-track-index="10"
        data-volume="0.22" src="assets/this_is_news_baked.mp3"></audio>
      <audio id="sfx-loop" class="clip"
        data-start="{{LOOP_START}}" data-duration="0.5" data-track-index="12"
        data-volume="0.8" src="assets/sfx/loop_thump.wav"></audio>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const I = window.SolInterrupts;

      gsap.set("#bg", { scale: 1.0 });
      gsap.set("#badge", { scale: 0.4, opacity: 0 });
      gsap.set("#bignum", { opacity: 0, scale: 0.4 });
      gsap.set("#hook", { opacity: 0, y: 40 });
      gsap.set("#ticker", { x: 1080 });
      gsap.set("#cut-flash", { opacity: 0 });
      gsap.set("#color-flash", { opacity: 0, backgroundColor: "rgba(0,255,136,0.4)" });

      tl.to("#badge", { scale: 1, opacity: 1, duration: 0.4, ease: "back.out(2.5)" }, 0);
      tl.to("#bignum", { opacity: 1, scale: 1, duration: 0.55, ease: "back.out(2.2)" }, 0.6);
      // Bignum exits at t=4 — it served the hook, now stop competing with karaoke.
      tl.to("#bignum", { opacity: 0, scale: 0.85, duration: 0.5, ease: "power2.in" }, 4.0);
      tl.to("#hook", { opacity: 1, y: 0, duration: 0.45, ease: "power3.out" }, 1.0);
      tl.to("#ticker", { x: -1080, duration: {{TICKER_DURATION}}, ease: "linear" }, 1.0);

      [3.0, 5.0, 8.0, 11.0, 13.5].forEach((t) => I.microcut(tl, t));

      // Beat-stamps stack upward instead of replacing. Stamp-1 enters at base,
      // slides up -110 when stamp-2 enters, slides up -220 when stamp-3 enters.
      // All three stay visible until the end-of-video fade.
      const BEATS_TIMES = {{BEATS_TIMES_JSON}};
      function _enterStamp(idx, t) {
        const sel = "#beat-stamp-" + idx;
        tl.fromTo(
          sel,
          { y: 220, opacity: 0, scale: 0.92 },
          { y: 0,   opacity: 1, scale: 1.0, duration: 0.4, ease: "back.out(2.4)" },
          t,
        );
        I.bgPunch(tl, t);
      }
      function _shiftStamp(idx, t, newY) {
        tl.to(
          "#beat-stamp-" + idx,
          { y: newY, duration: 0.4, ease: "power2.out" },
          t,
        );
      }
      if (BEATS_TIMES[0] != null) _enterStamp(1, BEATS_TIMES[0]);
      if (BEATS_TIMES[1] != null) {
        _shiftStamp(1, BEATS_TIMES[1], -110);
        _enterStamp(2, BEATS_TIMES[1]);
      }
      if (BEATS_TIMES[2] != null) {
        _shiftStamp(1, BEATS_TIMES[2], -220);
        _shiftStamp(2, BEATS_TIMES[2], -110);
        _enterStamp(3, BEATS_TIMES[2]);
      }
      // Final fade so the band is empty when the CTA stamp slides in.
      tl.to(".beat-stamp", { opacity: 0, y: "-=30", duration: 0.5, ease: "power2.in" }, 17.0);

      const EMPHASIS_TIMES = {{EMPHASIS_TIMES_JSON}};
      EMPHASIS_TIMES.forEach((t) => I.colorFlash(tl, t, "rgba(0,255,136,0.4)"));

      const WORDS = {{KARAOKE_WORDS_JSON}};
      I.karaokeRolling(tl, WORDS, { offset: 0.4, chunkSize: 2 });
      const CTA_TIME = {{CTA_TIME}};
      if (CTA_TIME != null) {
        I.ctaStamp(tl, CTA_TIME + 0.4, "#cta-stamp", { hold: 1.4 });
      }

      I.loopBridge(tl, {{DURATION}});

      window.__timelines["ReelMarkets"] = tl;
    </script>
  </body>
</html>
