<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @font-face {
        font-family: "Bebas Neue";
        src: url("assets/BebasNeue-Regular.ttf") format("truetype");
        font-display: block;
      }
      @font-face {
        font-family: "DM Serif Display";
        src: url("assets/DMSerifDisplay-Regular.ttf") format("truetype");
        font-display: block;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #000;
      }

      #root {
        position: relative;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
      }

      /* Stage content: badge + hook + stats + brand. The camera-zoom transform
         is applied to this whole block. */
      .stage-content {
        position: absolute;
        inset: 0;
        transform-origin: 50% 50%;
      }

      #bg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform-origin: center center;
      }

      .overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.25) 0%,
          rgba(0, 0, 0, 0.55) 45%,
          rgba(0, 0, 0, 0.7) 100%
        );
        z-index: 10;
      }

      /* Text content must sit above the bg video (which gets auto-injected z-index by Hyperframes) */
      .badge, .hook, .stat, .brand {
        z-index: 20;
      }

      .badge {
        position: absolute;
        top: 220px;
        left: 50%;
        transform: translateX(-50%);
        background: #b41e1e;
        color: #fff;
        font-family: "Bebas Neue", sans-serif;
        font-size: 40px;
        letter-spacing: 4px;
        padding: 14px 32px;
        border-radius: 4px;
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .badge::before {
        content: "";
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #fff;
      }

      .hook {
        position: absolute;
        top: 680px;
        left: 60px;
        right: 60px;
        font-family: "Bebas Neue", sans-serif;
        font-size: 110px;
        line-height: 0.95;
        color: #ffffff;
        letter-spacing: 1.5px;
        text-shadow: 4px 4px 14px rgba(0, 0, 0, 0.85);
      }

      .stat {
        position: absolute;
        left: 60px;
        right: 60px;
        display: flex;
        align-items: flex-start;
        gap: 16px;
      }
      .stat-bullet {
        font-family: "Bebas Neue", sans-serif;
        font-size: 56px;
        color: #ffd500;
        line-height: 0.95;
        flex-shrink: 0;
        text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
      }
      .stat-text {
        font-family: "Bebas Neue", sans-serif;
        font-size: 56px;
        color: #ffffff;
        line-height: 1.05;
        margin: 0;
        letter-spacing: 1px;
        text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.85);
      }
      #stat1 { top: 1050px; }
      #stat2 { top: 1230px; }
      #stat3 { top: 1410px; }

      .brand {
        position: absolute;
        top: 1700px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        font-family: "Bebas Neue", sans-serif;
        color: #ffffff;
        letter-spacing: 4px;
      }
      .brand-name {
        font-size: 42px;
        line-height: 1.1;
      }
      /* Police-style alarm lights — pulsating, no audio.
         Red on top + bottom, blue on left + right.
         Red and blue alternate phase = real siren feel. */
      .alarm-glow,
      .alarm-strip {
        position: absolute;
        pointer-events: none;
      }
      .alarm-glow {
        z-index: 99;
        mix-blend-mode: screen;
      }
      .alarm-strip {
        z-index: 100;
      }

      /* TOP — red (extended 10% taller) */
      .alarm-glow-top {
        top: 0;
        left: 0;
        right: 0;
        height: 308px;
        background: radial-gradient(
          ellipse at top,
          rgba(255, 30, 30, 0.85) 0%,
          rgba(255, 30, 30, 0.45) 35%,
          rgba(255, 30, 30, 0) 75%
        );
      }
      .alarm-strip-top {
        top: 0;
        left: 0;
        right: 0;
        height: 14px;
        background: linear-gradient(to bottom, #ff0020 0%, #c80018 100%);
        box-shadow: 0 0 32px rgba(255, 0, 30, 0.9), 0 0 80px rgba(255, 0, 30, 0.5);
      }

      /* BOTTOM — red (mirror of top, extended 10% taller) */
      .alarm-glow-bottom {
        bottom: 0;
        left: 0;
        right: 0;
        height: 308px;
        background: radial-gradient(
          ellipse at bottom,
          rgba(255, 30, 30, 0.85) 0%,
          rgba(255, 30, 30, 0.45) 35%,
          rgba(255, 30, 30, 0) 75%
        );
      }
      .alarm-strip-bottom {
        bottom: 0;
        left: 0;
        right: 0;
        height: 14px;
        background: linear-gradient(to top, #ff0020 0%, #c80018 100%);
        box-shadow: 0 0 32px rgba(255, 0, 30, 0.9), 0 0 80px rgba(255, 0, 30, 0.5);
      }

      /* LEFT — pale amber emergency (lighter) */
      .alarm-glow-left {
        top: 0;
        bottom: 0;
        left: 0;
        width: 280px;
        background: radial-gradient(
          ellipse at left,
          rgba(255, 220, 110, 0.6) 0%,
          rgba(255, 200, 90, 0.3) 35%,
          rgba(255, 200, 90, 0) 75%
        );
      }
      .alarm-strip-left {
        top: 0;
        bottom: 0;
        left: 0;
        width: 14px;
        background: linear-gradient(to right, #ffe066 0%, #ffaa44 100%);
        box-shadow: 0 0 32px rgba(255, 220, 110, 0.7), 0 0 80px rgba(255, 200, 90, 0.4);
      }

      /* RIGHT — pale amber emergency (mirror of left) */
      .alarm-glow-right {
        top: 0;
        bottom: 0;
        right: 0;
        width: 280px;
        background: radial-gradient(
          ellipse at right,
          rgba(255, 220, 110, 0.6) 0%,
          rgba(255, 200, 90, 0.3) 35%,
          rgba(255, 200, 90, 0) 75%
        );
      }
      .alarm-strip-right {
        top: 0;
        bottom: 0;
        right: 0;
        width: 14px;
        background: linear-gradient(to left, #ffe066 0%, #ffaa44 100%);
        box-shadow: 0 0 32px rgba(255, 220, 110, 0.7), 0 0 80px rgba(255, 200, 90, 0.4);
      }

      .brand-tag {
        font-size: 22px;
        opacity: 0.7;
        margin-top: 6px;
        letter-spacing: 6px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="ReelCard"
      data-start="0"
      data-duration="15"
      data-fps="30"
      data-width="1080"
      data-height="1920"
    >
      <div class="stage-content" id="stage-content" style="z-index: 1">
        <video
          id="bg"
          class="clip"
          data-start="0"
          data-duration="15"
          data-track-index="0"
          src="assets/{{BG}}"
          muted
          playsinline
         style="z-index: 9"></video>

        <div class="overlay"></div>

        <div class="badge" id="badge">{{LABEL}}</div>

        <div class="hook" id="hook">{{HOOK}}</div>

        <div class="stat" id="stat1">
          <span class="stat-bullet">▸</span>
          <p class="stat-text">{{STAT1}}</p>
        </div>
        <div class="stat" id="stat2">
          <span class="stat-bullet">▸</span>
          <p class="stat-text">{{STAT2}}</p>
        </div>
        <div class="stat" id="stat3">
          <span class="stat-bullet">▸</span>
          <p class="stat-text">{{STAT3}}</p>
        </div>

        <div class="brand">
          <div class="brand-name">THE CLAM LETTER</div>
          <div class="brand-tag">POLITICAL COMMENTARY</div>
        </div>
      </div>

      <!-- Red alarms (top + bottom only) — outside stage-content so they stay fixed -->
      <div class="alarm-glow alarm-glow-top" id="alarm-glow-top"></div>
      <div class="alarm-strip alarm-strip-top" id="alarm-strip-top"></div>
      <div class="alarm-glow alarm-glow-bottom" id="alarm-glow-bottom"></div>
      <div class="alarm-strip alarm-strip-bottom" id="alarm-strip-bottom"></div>

      <!-- Audio tracks -->
      <!-- TTS narration: Joe Stokes reads hook + all 3 stats (sped up 1.4x to fit ~14s) -->
      <audio
        id="tts-narration"
        class="clip"
        data-start="0.5"
        data-duration="14.5"
        data-track-index="9"
        data-volume="1.0"
        src="assets/{{TTS}}"
      ></audio>
      <!-- Music bed — ducked low so TTS is the clear primary -->
      <audio
        id="music"
        class="clip"
        data-start="0"
        data-duration="15"
        data-track-index="10"
        data-volume="0.28"
        src="assets/this_is_news_baked.mp3"
       style="z-index: 8"></audio>
      <audio
        id="sfx-open-impact"
        class="clip"
        data-start="0"
        data-duration="2"
        data-track-index="11"
        data-volume="1.0"
        src="assets/sfx/open_impact.wav"
       style="z-index: 7"></audio>
      <audio
        id="sfx-whoosh-intro"
        class="clip"
        data-start="0.4"
        data-duration="1.5"
        data-track-index="12"
        data-volume="0.708"
        src="assets/sfx/whoosh_tail.wav"
       style="z-index: 6"></audio>
      <audio
        id="sfx-whoosh-stat1"
        class="clip"
        data-start="2.0"
        data-duration="1.5"
        data-track-index="13"
        data-volume="0.85"
        src="assets/sfx/whoosh_tail.wav"
       style="z-index: 5"></audio>
      <audio
        id="sfx-whoosh-stat2"
        class="clip"
        data-start="4.7"
        data-duration="1.5"
        data-track-index="14"
        data-volume="0.85"
        src="assets/sfx/whoosh_tail.wav"
       style="z-index: 4"></audio>
      <audio
        id="sfx-whoosh-stat3"
        class="clip"
        data-start="7.4"
        data-duration="1.5"
        data-track-index="15"
        data-volume="0.85"
        src="assets/sfx/whoosh_tail.wav"
       style="z-index: 3" data-media-start="0"></audio>
      <audio
        id="sfx-loop-thump"
        class="clip"
        data-start="14.5"
        data-duration="0.5"
        data-track-index="16"
        data-volume="0.794"
        src="assets/sfx/loop_thump.wav"
       style="z-index: 2"></audio>
    </div>

    <script>
      window.__timelines = window.__timelines || {};

      const tl = gsap.timeline({ paused: true });

      // === Initial states for entrance animations ===
      gsap.set("#bg", { scale: 1.0 });
      gsap.set("#badge", { scale: 0.4, opacity: 0 });
      gsap.set("#hook", { clipPath: "inset(0 100% 0 0)", opacity: 1 });
      gsap.set(["#stat1", "#stat2", "#stat3"], { opacity: 0, x: -180 });
      gsap.set("#stat2", { x: 180 }); // stat2 enters from right
      gsap.set(".stat-bullet", { scale: 1 });

      // Stats appear sequentially: 2.0s, 4.7s, 7.4s (2.7s apart)
      const STAT1_TIME = 2.0;
      const STAT2_TIME = 4.7;
      const STAT3_TIME = 7.4;

      // === HOOK ENTRANCE BLOCK (0 → 1.5s) — punchy, fast, hook-able ===

      // Badge: pop in with bounce (snappy attention grabber)
      tl.to(
        "#badge",
        { scale: 1, opacity: 1, duration: 0.45, ease: "back.out(2.5)" },
        0,
      );

      // Hook: clip-path reveal left → right (like a typewriter wipe, big-impact)
      tl.to(
        "#hook",
        { clipPath: "inset(0 0% 0 0)", duration: 0.55, ease: "power3.out" },
        0.15,
      );

      // Stats slide in alternating sides at 2.0s, 4.7s, 7.4s (2.7s apart)
      tl.to("#stat1", { x: 0, opacity: 1, duration: 0.4, ease: "power3.out" }, STAT1_TIME);
      tl.to("#stat2", { x: 0, opacity: 1, duration: 0.4, ease: "power3.out" }, STAT2_TIME);
      tl.to("#stat3", { x: 0, opacity: 1, duration: 0.4, ease: "power3.out" }, STAT3_TIME);

      // Bullet pulse on the just-appeared stat (subtle attention catch)
      tl.to("#stat1 .stat-bullet", { scale: 1.25, duration: 0.18, yoyo: true, repeat: 1, ease: "power2.inOut" }, STAT1_TIME + 0.3);
      tl.to("#stat2 .stat-bullet", { scale: 1.25, duration: 0.18, yoyo: true, repeat: 1, ease: "power2.inOut" }, STAT2_TIME + 0.3);
      tl.to("#stat3 .stat-bullet", { scale: 1.25, duration: 0.18, yoyo: true, repeat: 1, ease: "power2.inOut" }, STAT3_TIME + 0.3);

      // === Emergency lights: red top + bottom only (sides removed) ===
      // Cycle = 0.5s × 2 (yoyo) = 1s. For 15s total: 14 repeats.
      const RED_TARGETS = [
        "#alarm-glow-top",
        "#alarm-strip-top",
        "#alarm-glow-bottom",
        "#alarm-strip-bottom",
      ];
      gsap.set(RED_TARGETS, { opacity: 1 });
      tl.to(
        RED_TARGETS,
        { opacity: 0.35, duration: 0.5, repeat: 14, yoyo: true, ease: "sine.inOut" },
        0,
      );

      // No camera zoom, no fade-ins — text is visible throughout.
      // BG video, audio cues, and emergency lights handle the dynamism.

      window.__timelines["ReelCard"] = tl;
    </script>
  </body>
</html>
